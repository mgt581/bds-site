<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bryant Digital Solutions</title>
    <script>
      const path = window.location.pathname;
      const repoBaseMatch = path.match(/^(.*\/bds-site)(?:\/.*)?$/);
      const repoBase = repoBaseMatch ? repoBaseMatch[1] : "";
      const relativePath = repoBase ? path.slice(repoBase.length) : path;
      window.location.replace(`${repoBase}/docs${relativePath}${window.location.search}${window.location.hash}`);
    </script>
  </head>
  <body>
    <p>Loading <a href="docs/index.html">Bryant Digital Solutions</a>...</p>
  </body>
</html>
