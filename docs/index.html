<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0; url=/bds-site/" />
    <title>Redirecting...</title>
    <link rel="canonical" href="/bds-site/" />
    <script>
      const match = window.location.pathname.match(/^(.*\/bds-site)(?:\/docs\/?)?$/);
      const base = match ? `${match[1]}/` : '/bds-site/';
      window.location.replace(`${base}${window.location.search}${window.location.hash}`);
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="/bds-site/">homepage</a>...</p>
  </body>
</html>
