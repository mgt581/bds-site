# Firebase App Hosting configuration for the Next.js audit platform.
#
# Secrets are set with `firebase apphosting:secrets:set` and kept out of git.
runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

env:
  - variable: DATABASE_URL
    secret: bdsDatabaseUrl
    availability:
      - BUILD
      - RUNTIME
  - variable: DIRECT_URL
    secret: bdsDirectUrl
    availability:
      - BUILD
      - RUNTIME
  - variable: ADMIN_PASSWORD
    secret: bdsAdminPassword
    availability:
      - RUNTIME
  - variable: NEXTAUTH_SECRET
    secret: bdsNextAuthSecret
    availability:
      - RUNTIME
  - variable: NEXTAUTH_URL
    value: https://bds-site--bdssite-5fac1.europe-west4.hosted.app
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_APP_URL
    value: https://bds-site--bdssite-5fac1.europe-west4.hosted.app
    availability:
      - BUILD
      - RUNTIME
  - variable: RESEND_FROM_EMAIL
    value: noreply@bryantdigitalsolutions.com
    availability:
      - RUNTIME
  - variable: ADMIN_EMAIL
    value: info@bryantdigitalsolutions.com
    availability:
      - RUNTIME
  - variable: RESEND_API_KEY
    secret: bdsResendApiKey
    availability:
      - RUNTIME
  - variable: OPENAI_API_KEY
    secret: bdsOpenAiApiKey
    availability:
      - RUNTIME
  - variable: PAGESPEED_API_KEY
    secret: bdsPagespeedApiKey
    availability:
      - RUNTIME
